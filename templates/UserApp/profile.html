{% extends "base.html" %}
{% block title %}AgriVision | Profile{% endblock %}

{% block content %}
<section class="py-3">
  <div class="row justify-content-center">
    <div class="col-xl-8">
      <div class="glass-card p-4 p-lg-5">
        <span class="section-badge mb-3">
          <i class="bi bi-person-badge-fill"></i> Profile
        </span>

        <h2 class="fw-bold mb-2">User Details</h2>
        <p class="text-muted mb-4">Your account information is shown below.</p>

        <div class="row g-4">
          <div class="col-md-6">
            <div class="feature-card">
              <div class="feature-icon"><i class="bi bi-person-circle"></i></div>
              <h5 class="fw-bold mb-2">Username</h5>
              <p class="mb-0">{{ request.user.username }}</p>
            </div>
          </div>

          <div class="col-md-6">
            <div class="feature-card">
              <div class="feature-icon"><i class="bi bi-envelope-fill"></i></div>
              <h5 class="fw-bold mb-2">Email</h5>
              <p class="mb-0">{{ request.user.email|default:"Not provided" }}</p>
            </div>
          </div>
        </div>

        <div class="d-flex flex-wrap gap-3 mt-4">
          <a href="/user/dashboard/" class="btn btn-soft">
            <i class="bi bi-grid-fill"></i> Back to Dashboard
          </a>
          <a href="/user/logout/" class="btn btn-theme">
            <i class="bi bi-box-arrow-right"></i> Logout
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
