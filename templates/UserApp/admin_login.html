{% extends "base.html" %}
{% block title %}AgriVision | Result{% endblock %}

{% block content %}
<section class="py-3">
  <div class="row justify-content-center">
    <div class="col-xl-8">
      <div class="glass-card p-4 p-lg-5 text-center">
        <span class="section-badge mb-3"><i class="bi bi-clipboard-data-fill"></i> Prediction Result</span>
        <h1 class="fw-bold mb-3">{{ title }}</h1>

        <div class="row g-4 mt-2">
          <div class="col-md-4">
            <div class="feature-card">
              <div class="feature-icon mx-auto"><i class="bi bi-check2-circle"></i></div>
              <h5 class="fw-bold">Prediction</h5>
              <p class="mb-0">{{ prediction }}</p>
            </div>
          </div>

          <div class="col-md-4">
            <div class="feature-card">
              <div class="feature-icon mx-auto"><i class="bi bi-speedometer2"></i></div>
              <h5 class="fw-bold">Confidence</h5>
              <p class="mb-0">{{ confidence }}</p>
            </div>
          </div>

          <div class="col-md-4">
            <div class="feature-card">
              <div class="feature-icon mx-auto"><i class="bi bi-lightbulb-fill"></i></div>
              <h5 class="fw-bold">Suggestion</h5>
              <p class="mb-0">{{ suggestion }}</p>
            </div>
          </div>
        </div>

        <div class="d-flex flex-wrap justify-content-center gap-3 mt-4">
          <a href="/user/dashboard/" class="btn btn-soft"><i class="bi bi-grid-fill"></i> Dashboard</a>
          <a href="/user/logout/" class="btn btn-theme"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
